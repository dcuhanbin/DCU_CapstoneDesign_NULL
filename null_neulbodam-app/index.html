<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="card" id="login-card">
            <h1>로그인</h1>
            <form id="login-form" class="form">
                <div class="input-group">
                    <label for="login-id">아이디</label>
                    <input type="text" id="login-id" placeholder="아이디를 입력하세요" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">로그인</button>
            </form>
            <p class="switch-text">
                계정이 없으신가요?
                <a href="#" id="go-register">회원가입</a>
            </p>
        </div>

        <div class="card hidden" id="register-card">
            <h1>회원가입</h1>
            <form id="register-form" class="form">
                <div class="input-group">
                    <label for="register-id">아이디</label>
                    <input type="text" id="register-id" placeholder="아이디를 입력하세요 (4자 이상)" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="register-password">비밀번호</label>
                    <input type="password" id="register-password" placeholder="비밀번호를 입력하세요 (6자 이상)" autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="register-password-confirm">비밀번호 확인</label>
                    <input type="password" id="register-password-confirm" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">회원가입</button>
            </form>
            <p class="switch-text">
                이미 계정이 있으신가요?
                <a href="#" id="go-login">로그인</a>
            </p>
        </div>

        <div class="card hidden" id="welcome-card">
            <h1>환영합니다!</h1>
            <p class="welcome-text" id="welcome-message"></p>
            <button type="button" class="btn btn-secondary" id="logout-btn">로그아웃</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
